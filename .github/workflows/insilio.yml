name: compilar y subir PDFs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: compilar PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: semestre-03/insilio/informes
          root_file: informes.tex
          args: -pdf -interaction=nonstopmode -jobname=informes

      - name: encontrar pdf
        run: find . -name "*.pdf"

      - name: preparar sitio
        run: |
          mkdir site
          cp semestre-03/insilio/informes/informes.pdf site/informes.pdf

          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>montoyamoraga - informes insilio</title>
            <style>
              body {
                margin: 0;
                font-family: sans-serif;
              }

              iframe {
                width: 100%;
                height: 100vh;
                border: none;
              }
            </style>
          </head>
          <body>
            <iframe src="informes.pdf"></iframe>
          </body>
          </html>
          EOF

      - name: upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4